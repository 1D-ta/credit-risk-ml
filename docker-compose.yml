services:
  training:
    build:
      context: .
      dockerfile: docker/training.Dockerfile
    volumes:
      - ./:/app
    working_dir: /app

  inference:
    build:
      context: .
      dockerfile: docker/inference.Dockerfile
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      training:
        condition: service_completed_successfully

  monitoring:
    build:
      context: .
      dockerfile: docker/monitoring.Dockerfile
    volumes:
      - ./:/app
    working_dir: /app
    depends_on:
      training:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      - inference

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus